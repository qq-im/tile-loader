name: Build and Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: 设置 JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'
          
      - name: 编译
        run: ./gradlew build -x test
        
      - name: 创建 Release 并上传 jar
        uses: softprops/action-gh-release@v1
        with:
          tag_name: build-${{ github.run_number }}
          name: 自动构建 #${{ github.run_number }}
          body: |
            自动编译的地图瓦片下载器
            
            下载 tile-loader.jar 后，双击或在命令行运行：
            ```
            java -jar tile-loader.jar
            ```
            然后浏览器打开 http://localhost:8080 即可使用。
          files: build/libs/tile-loader.jar
